name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Without this, annotated tags are checked out as lightweight refs,
          # so `git for-each-ref %(contents)` falls back to the tagged commit's
          # message instead of returning the tag annotation we wrote.
          fetch-tags: true

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python (for jprm)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install jprm
        run: pip install jprm

      - name: Extract version from tag
        id: ver
        run: |
          REF="${GITHUB_REF#refs/tags/v}"
          echo "version=$REF" >> "$GITHUB_OUTPUT"

      - name: Set version in build.yaml
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.ver.outputs.version }}\"/" Jellyfish.Bridge/build.yaml

      - name: Derive changelog (annotated tag message, else commits since previous tag) and inject into build.yaml
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # actions/checkout leaves annotated tags as lightweight refs even with
          # fetch-tags: true, so force a fresh fetch to get the tag object.
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" --force
          NOTES="$(git for-each-ref --format='%(contents)' "refs/tags/$TAG")"
          # Drop a trailing PGP block if the tag is signed.
          NOTES="$(printf '%s' "$NOTES" | sed -e '/^-----BEGIN PGP SIGNATURE-----/,$d' -e '/^[[:space:]]*$/N;/\n[[:space:]]*$/D')"
          if [ -z "$NOTES" ]; then
            PREV="$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)"
            if [ -n "$PREV" ]; then
              NOTES="$(git log "$PREV..$TAG" --pretty='format:- %s')"
            else
              NOTES="$(git log "$TAG" --pretty='format:- %s' | head -20)"
            fi
          fi
          [ -z "$NOTES" ] && NOTES="Release $TAG."
          printf '%s\n' "$NOTES" > /tmp/changelog.txt
          echo "===== changelog ====="
          cat /tmp/changelog.txt
          echo "====================="
          # jprm has no --changelog flag; it reads `changelog:` from build.yaml.
          # Strip the existing block and append a fresh one with the derived notes.
          sed -i '/^changelog:/,$d' Jellyfish.Bridge/build.yaml
          {
            echo "changelog: |-"
            sed 's/^/  /' /tmp/changelog.txt
          } >> Jellyfish.Bridge/build.yaml

      - name: Seed manifest from gh-pages (or init fresh)
        run: |
          mkdir -p artifacts repo
          git fetch origin gh-pages 2>/dev/null || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1 && \
             git show origin/gh-pages:manifest.json > repo/manifest.json 2>/dev/null; then
            echo "Loaded existing manifest from gh-pages"
          else
            jprm --verbosity=debug repo init repo
            echo "Initialised empty manifest"
          fi

      - name: Build + package via jprm
        run: |
          jprm --verbosity=debug plugin build Jellyfish.Bridge \
            --output artifacts
          jprm --verbosity=debug repo add \
            --url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" \
            repo artifacts/*.zip

      - name: Upload zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true

      - name: Upload manifest.json to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: repo
          keep_files: true
